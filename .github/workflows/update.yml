name: Auto Update Index
on:
  push:
    paths:
      - 'streaming_links/**' # Jab bhi is folder mein naya link aaye tab chale

permissions:
  contents: write # Required for committing and pushing changes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 1: Snapshot the OLD index before regeneration
      - name: Snapshot Old Index
        run: cp index.json old_index_snapshot.json || echo '{}' > old_index_snapshot.json

      # Step 2: Generate the NEW index
      - name: Generate New Index
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scripts/generate_index.js

      # Step 3: Generate Posting Record (diff old vs new)
      - name: Generate Posting Record
        run: node scripts/generate_posting_record.js

      # Step 4: Find Duplicates
      - name: Find Duplicates
        run: node scripts/find_duplicates.js

      # Step 5: Cleanup snapshot & generate catalog & commit
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Generate Paginated Catalog
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scripts/generate_catalog.py --repo-root . --output-dir ./catalog --page-size 50

      - name: Commit and Push
        run: |
          rm -f old_index_snapshot.json
          git config --global user.name "DanieWatch Bot"
          git config --global user.email "bot@daniewatch.com"
          git add index.json duplicate_posts.md posting_record.json catalog/ release_dates_cache.json
          git commit -m "chore: auto-update index, catalog & posting record [skip ci]" || exit 0
          git push
