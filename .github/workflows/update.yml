name: Auto Update Catalog
on:
  push:
    paths:
      - 'streaming_links/**' # Runs when new streaming links are added

permissions:
  contents: write # Required for committing and pushing changes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 1: Generate Posting Record (scans streaming_links/ directly)
      - name: Generate Posting Record
        run: node scripts/generate_posting_record.js

      # Step 2: Find Duplicates
      - name: Find Duplicates
        run: node scripts/find_duplicates.js

      # Step 3: Generate catalog with sorting overrides
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Generate Paginated Catalog
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scripts/generate_catalog.py --repo-root . --output-dir ./catalog --page-size 50

      # Step 4: Commit and Push
      - name: Commit and Push
        run: |
          git config --global user.name "DanieWatch Bot"
          git config --global user.email "bot@daniewatch.com"
          git add posting_record.json duplicate_posts.md catalog/ release_dates_cache.json sorting/
          git commit -m "chore: auto-update catalog, posting record & sorting [skip ci]" || exit 0
          git push
