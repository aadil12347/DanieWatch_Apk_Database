name: Auto Update Index

on:
  push:
    paths:
      - 'streaming_links/**' # Runs when streaming links are added, modified, or deleted
      - 'index.json'         # Runs when index.json is manually updated
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Required for committing and pushing changes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history to ensure proper git tracking

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Index
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: python scripts/generate_index.py

      - name: Commit and Push
        run: |
          git config --global user.name "DanieWatch Bot"
          git config --global user.email "bot@daniewatch.com"
          git add index.json no_sorting.json
          git commit -m "chore: auto-update index [skip ci]" || echo "No changes to commit"
          git push
