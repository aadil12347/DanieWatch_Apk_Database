name: Auto Update Index
on:
  push:
    paths:
      - 'streaming_links/**' # Runs when new streaming links are added
      - 'Top 5/**'
      - 'Top 10/**'

permissions:
  contents: write # Required for committing and pushing changes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 1: Generate Posting Record (scans streaming_links/ directly)
      - name: Generate Posting Record
        run: node scripts/generate_posting_record.js

      # Step 2: Find Duplicates
      - name: Find Duplicates
        run: node scripts/find_duplicates.js

      # Step 3: Generate index (base_index + incremental updates + home sections)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Index
        run: python scripts/generate_index.py --repo-root .

      # Step 4: Commit and Push
      - name: Commit and Push
        run: |
          git config --global user.name "DanieWatch Bot"
          git config --global user.email "bot@daniewatch.com"
          git add posting_record.json duplicate_posts.md base_index.json updates/ index/
          git commit -m "chore: auto-update index [skip ci]" || exit 0
          git push
